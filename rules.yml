version: "3.1"

rules:
  - rule: greet user
    steps:
      - intent: greet
      - action: utter_greet
      - action: utter_ethics_notice

  - rule: say goodbye
    steps:
      - intent: goodbye
      - action: utter_goodbye

  - rule: respond to thanks
    steps:
      - intent: thanks
      - action: utter_thanks

  - rule: activate trip planning form
    steps:
      - intent: book_trip
      - action: trip_planning_form
      - active_loop: trip_planning_form

  - rule: submit trip planning form
    condition:
      - active_loop: trip_planning_form
    steps:
      - action: trip_planning_form
      - active_loop: null
      - action: utter_trip_slots_received
      - action: action_calculate_carbon
      - action: action_get_recommendations

  - rule: recommendation request
    steps:
      - intent: ask_recommendation
      - action: action_get_recommendations

  - rule: carbon calculation flow
    steps:
      - intent: ask_carbon
      - action: action_calculate_carbon

  - rule: clarification when destination supplied first
    steps:
      - intent: inform_destination
      - action: trip_planning_form
      - active_loop: trip_planning_form

  - rule: human handover
    steps:
      - intent: ask_handover
      - action: utter_escalating
      - action: action_handover_to_human

  - rule: out of scope response
    steps:
      - intent: out_of_scope
      - action: utter_out_of_scope

  - rule: fallback clarification and recovery
    steps:
      - intent: nlu_fallback
      - action: action_default_fallback
